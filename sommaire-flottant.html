<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lcn-night: #1A2340; --lcn-text: #334155;
      --lcn-navy: #344C94;  --lcn-sky: #CCEDFB;
      --lcn-white: #FFFFFF; --lcn-border: #E5E7EB;
      --lcn-bg-main: #F8FAFC; --lcn-kaki: #6B7F2A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: transparent;
    }

    /* ── BOUTON FLOTTANT ── */
    .sommaire-trigger {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--lcn-night);
      color: var(--lcn-white);
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26, 35, 64, 0.25);
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .sommaire-trigger:hover {
      background: var(--lcn-navy);
      box-shadow: 0 6px 20px rgba(52, 76, 148, 0.3);
    }

    .trigger-icon {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .trigger-icon span {
      display: block;
      width: 14px;
      height: 1.5px;
      background: var(--lcn-white);
      border-radius: 2px;
      transition: all 0.25s ease;
    }

    .sommaire-trigger.open .trigger-icon span:nth-child(1) {
      transform: rotate(45deg) translate(3px, 3px);
    }

    .sommaire-trigger.open .trigger-icon span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .sommaire-trigger.open .trigger-icon span:nth-child(3) {
      transform: rotate(-45deg) translate(3px, -3px);
    }

    /* ── PANNEAU ── */
    .sommaire-panel {
      position: fixed;
      bottom: 88px;
      right: 32px;
      z-index: 999;
      width: 260px;
      background: var(--lcn-white);
      border: 1px solid var(--lcn-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(26, 35, 64, 0.12);
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      transform-origin: bottom right;
    }

    .sommaire-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--lcn-border);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--lcn-text);
      opacity: 0.5;
    }

    .panel-nav {
      padding: 8px 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .nav-link:hover {
      background: rgba(52, 76, 148, 0.05);
    }

    .nav-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--lcn-text);
      opacity: 0.35;
      width: 16px;
      flex-shrink: 0;
    }

    .nav-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--lcn-night);
      line-height: 1.3;
    }

    .nav-divider {
      height: 1px;
      background: var(--lcn-border);
      margin: 4px 16px;
    }

    .nav-link--cta .nav-label {
      color: var(--lcn-navy);
      font-weight: 600;
    }

    .nav-link--cta:hover {
      background: var(--lcn-navy);
    }

    .nav-link--cta:hover .nav-num,
    .nav-link--cta:hover .nav-label {
      color: var(--lcn-white);
      opacity: 1;
    }

    /* ── OVERLAY ── */
    .sommaire-overlay {
      position: fixed;
      inset: 0;
      z-index: 998;
      display: none;
    }

    .sommaire-overlay.open {
      display: block;
    }

    @media (max-width: 580px) {
      .sommaire-trigger { bottom: 20px; right: 16px; padding: 10px 16px; }
      .sommaire-panel { right: 16px; bottom: 76px; width: calc(100vw - 32px); }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="sommaire-overlay" id="overlay" onclick="closeSommaire()"></div>

  <!-- PANNEAU -->
  <div class="sommaire-panel" id="panel" role="dialog" aria-label="Sommaire de la page">
    <div class="panel-header">✦ Sommaire</div>
    <nav class="panel-nav">

      <a href="#difference" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">01</span>
        <span class="nav-label">Une différence immédiate</span>
      </a>
      <a href="#ce-que-ca-change" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">02</span>
        <span class="nav-label">Ce que ça change</span>
      </a>
      <a href="#pour-qui" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">03</span>
        <span class="nav-label">Pour qui ?</span>
      </a>

      <div class="nav-divider"></div>

      <a href="#prestations" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">04</span>
        <span class="nav-label">Les prestations</span>
      </a>
      <a href="#methode-claire" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">05</span>
        <span class="nav-label">La méthode CLAIRE®</span>
      </a>
      <a href="#tous-les-contenus" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">06</span>
        <span class="nav-label">Tous les contenus</span>
      </a>

      <div class="nav-divider"></div>

      <a href="#questions" class="nav-link" onclick="closeSommaire()">
        <span class="nav-num">07</span>
        <span class="nav-label">Des questions ?</span>
      </a>
      <a href="#rendez-vous" class="nav-link nav-link--cta" onclick="closeSommaire()">
        <span class="nav-num">08</span>
        <span class="nav-label">Prenons rendez-vous →</span>
      </a>

    </nav>
  </div>

  <!-- BOUTON -->
  <button class="sommaire-trigger" id="trigger" onclick="toggleSommaire()" aria-expanded="false" aria-controls="panel">
    <span class="trigger-icon">
      <span></span>
      <span></span>
      <span></span>
    </span>
    Sommaire
  </button>

  <script>
    function toggleSommaire() {
      var trigger = document.getElementById('trigger');
      var panel = document.getElementById('panel');
      var overlay = document.getElementById('overlay');
      var isOpen = panel.classList.contains('open');
      panel.classList.toggle('open', !isOpen);
      trigger.classList.toggle('open', !isOpen);
      overlay.classList.toggle('open', !isOpen);
      trigger.setAttribute('aria-expanded', !isOpen);
    }

    function closeSommaire() {
      document.getElementById('panel').classList.remove('open');
      document.getElementById('trigger').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('trigger').setAttribute('aria-expanded', 'false');
    }
  </script>

</body>
</html>
