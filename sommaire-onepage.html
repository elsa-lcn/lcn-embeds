<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lcn-night: #1A2340; --lcn-text: #334155;
      --lcn-navy: #344C94;  --lcn-sky: #CCEDFB;
      --lcn-white: #FFFFFF; --lcn-border: #E5E7EB;
      --lcn-bg-main: #F8FAFC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: transparent;
      padding: 0;
    }

    .sommaire {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sommaire-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sommaire-link {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      transition: all 0.2s ease;
      width: 100%;
    }

    .sommaire-link:hover {
      background: rgba(52, 76, 148, 0.06);
    }

    .sommaire-link:hover .sommaire-num {
      color: var(--lcn-navy);
    }

    .sommaire-link:hover .sommaire-label {
      color: var(--lcn-navy);
    }

    .sommaire-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--lcn-text);
      opacity: 0.4;
      letter-spacing: 0.05em;
      width: 20px;
      flex-shrink: 0;
      transition: color 0.2s ease;
    }

    .sommaire-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--lcn-night);
      line-height: 1.3;
      transition: color 0.2s ease;
    }

    .sommaire-divider {
      height: 1px;
      background: var(--lcn-border);
      margin: 6px 14px;
    }

    /* Item CTA */
    .sommaire-link--cta .sommaire-label {
      color: var(--lcn-navy);
      font-weight: 600;
    }

    .sommaire-link--cta:hover {
      background: var(--lcn-navy);
    }

    .sommaire-link--cta:hover .sommaire-num,
    .sommaire-link--cta:hover .sommaire-label {
      color: var(--lcn-white);
    }

    @media (max-width: 580px) {
      .sommaire-label { font-size: 13px; }
    }
  </style>
</head>
<body>

  <nav class="sommaire" aria-label="Sommaire de la page">

    <div class="sommaire-item">
      <a href="#difference" class="sommaire-link">
        <span class="sommaire-num">01</span>
        <span class="sommaire-label">Une différence immédiate</span>
      </a>
    </div>

    <div class="sommaire-item">
      <a href="#ce-que-ca-change" class="sommaire-link">
        <span class="sommaire-num">02</span>
        <span class="sommaire-label">Ce que ça change</span>
      </a>
    </div>

    <div class="sommaire-item">
      <a href="#pour-qui" class="sommaire-link">
        <span class="sommaire-num">03</span>
        <span class="sommaire-label">Pour qui ?</span>
      </a>
    </div>

    <div class="sommaire-divider"></div>

    <div class="sommaire-item">
      <a href="#prestations" class="sommaire-link">
        <span class="sommaire-num">04</span>
        <span class="sommaire-label">Les prestations</span>
      </a>
    </div>

    <div class="sommaire-item">
      <a href="#methode-claire" class="sommaire-link">
        <span class="sommaire-num">05</span>
        <span class="sommaire-label">La méthode CLAIRE®</span>
      </a>
    </div>

    <div class="sommaire-item">
      <a href="#tous-les-contenus" class="sommaire-link">
        <span class="sommaire-num">06</span>
        <span class="sommaire-label">Tous les contenus</span>
      </a>
    </div>

    <div class="sommaire-divider"></div>

    <div class="sommaire-item">
      <a href="#questions" class="sommaire-link">
        <span class="sommaire-num">07</span>
        <span class="sommaire-label">Des questions ?</span>
      </a>
    </div>

    <div class="sommaire-item">
      <a href="#rendez-vous" class="sommaire-link sommaire-link--cta">
        <span class="sommaire-num">08</span>
        <span class="sommaire-label">Prenons rendez-vous →</span>
      </a>
    </div>

  </nav>

</body>
</html>
